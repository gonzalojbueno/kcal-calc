<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calorías App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CSS APP -->
  <link rel="stylesheet" href="styles.css">

</head>

<body class="bg-light">

  <!-- LOGIN -->

  <div id="loginScreen" class="screen">

    <div class="app-card card shadow-sm">

      <div class="card-body">

        <h2 class="mb-4">
          <i class="bi bi-person-circle"></i>
          Login
        </h2>

        <div class="mb-3">
          <label class="form-label">
            Usuario
          </label>

          <input id="username" class="form-control" placeholder="Usuario">
        </div>

        <div class="mb-3">
          <label class="form-label">
            Contraseña
          </label>

          <input id="password" class="form-control" type="password" placeholder="Contraseña">
        </div>

        <button class="btn btn-primary w-100" onclick="login()">

          <i class="bi bi-box-arrow-in-right"></i>
          Entrar

        </button>

        <p id="loginError" class="text-danger mt-3 mb-0">
        </p>

      </div>

    </div>

  </div>

  <!-- APP -->

  <div id="appScreen" class="screen hidden">

    <div class="app-card card shadow-sm">

      <div class="card-body">

        <h2 class="mb-1">
          <i class="bi bi-fire"></i>
          Calculadora de Calorías
        </h2>

        <div id="todayDate" class="text-muted mb-4">
        </div>

        <!-- FORMULARIO -->

        <h3 class="h5 mb-3">
          <i class="bi bi-plus-circle"></i>
          Agregar alimento
        </h3>

        <div class="mb-3">

          <label class="form-label">
            Nombre del alimento
          </label>

          <input id="food" class="form-control" list="foodSuggestions" placeholder="Ej: Avena">

          <datalist id="foodSuggestions"></datalist>

        </div>

        <div class="mb-3 p-3 border border-success rounded bg-light">

          <label class="form-label fw-bold text-success">

            Grs consumidos

          </label>

          <input id="grams" class="form-control border-success border-2" type="number" placeholder="Ej: 150">

        </div>

        <div class="row">
  <div class="col-6 col-md mb-3">
    <label class="form-label small fw-bold">Kcal</label>
    <input id="kcal100" class="form-control" type="number" placeholder="350">
  </div>

  <div class="col-6 col-md mb-3">
    <label class="form-label small fw-bold">Prot</label>
    <input id="protein100" class="form-control" type="number" placeholder="13">
  </div>

  <div class="col-6 col-md mb-3">
    <label class="form-label small fw-bold">Carb</label>
    <input id="carbs100" class="form-control" type="number" placeholder="60">
  </div>

  <div class="col-6 col-md mb-3">
    <label class="form-label small fw-bold">Fibra</label>
    <input id="fiber100" class="form-control" type="number" placeholder="10">
  </div>

  <div class="col-6 col-md mb-3">
    <label class="form-label small fw-bold">Grasa</label>
    <input id="fat100" class="form-control" type="number" placeholder="7">
  </div>
</div>

        <button class="btn btn-primary w-100 mb-4" onclick="addFood()">

          <i class="bi bi-plus-lg"></i>
          Agregar

        </button>

        <!-- MIS ALIMENTOS -->

        <details id="foodsSection" class="mb-4">

          <summary id="foodsSummary" class="fw-bold">

            <i class="bi bi-basket"></i>
            Mis alimentos (0)

          </summary>

          <div id="foodList" class="mt-3">
          </div>

        </details>

        <!-- REGISTROS -->

        <h3 class="h5 mb-3">

          <i class="bi bi-journal-text"></i>
          Registros

        </h3>

        <div id="list"></div>

        <hr>

        <!-- TOTAL -->

        <h3 class="h5">

          <i class="bi bi-fire"></i>
          Total del día

        </h3>

        <div id="total" class="fs-4 fw-bold mb-4">

          0 kcal

        </div>

        <!-- SALIR -->

        <button class="btn btn-outline-secondary w-100" onclick="logout()">

          <i class="bi bi-box-arrow-right"></i>
          Salir

        </button>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
  </script>

  <!--Supabase  -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- APP JS -->
  <script src="app.js"></script>

</body>

</html>
