<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorías App</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen" class="screen">

    <h2>Login</h2>

    <input
      id="username"
      placeholder="Usuario">

    <input
      id="password"
      type="password"
      placeholder="Contraseña">

    <button onclick="login()">
      Entrar
    </button>

    <p id="loginError"></p>

  </div>

  <!-- APP -->
  <div id="appScreen" class="screen hidden">

    <h2>Calculadora de Calorías</h2>

    <div id="todayDate"></div>

    <h3>Agregar alimento</h3>

    <label>Nombre del alimento</label>

    <input
      id="food"
      list="foodSuggestions"
      placeholder="Ej: Avena">

    <datalist id="foodSuggestions"></datalist>

    <label>Kcal por 100g</label>

    <input
      id="kcal100"
      type="number"
      placeholder="Ej: 350">

    <label>Gramos consumidos</label>

    <input
      id="grams"
      type="number"
      placeholder="Ej: 50">

    <button onclick="addFood()">
      Agregar
    </button>

    <h3>Registros</h3>

    <div id="list"></div>

    <details id="foodsSection">

  <summary>
    Mis alimentos
  </summary>

  <div id="foodList"></div>

</details>

    <hr>

    <h3>Total del día</h3>

    <div id="total">0 kcal</div>

    <button onclick="logout()">
      Salir
    </button>

  </div>

  <script src="app.js"></script>

</body>

</html>
